<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}">
<head>
  <meta charset="UTF-8">
  <title>{{ .Title }}</title>
  {{ partial "brand/css-vars" . }}
  {{ partial "print-doc-css" . }}
  {{ partial "scripts/mathjax.html" . }}
</head>
<body class="doc-print doc-report-print">
  <table class="doc-page">
    <tfoot><tr><td>{{ partial "brand/doc-footer" . }}</td></tr></tfoot>
    <tbody><tr><td>
      {{ partial "brand/report-title-page" . }}
      <div class="doc-body">
        {{- .Content -}}
      </div>
    </td></tr></tbody>
  </table>
</body>
</html>
